# Template sensor configuration for Home Assistant
# Add this to your configuration.yaml to create a unified waste collection sensor
# similar to your existing sensor.next_waste_collection

template:
  - sensor:
      - name: "Next Waste Collection"
        unique_id: "hounslow_next_waste_collection"
        state: |
          {% set collections = [
            {
              'type': 'Rec',
              'sensor': 'sensor.hounslow_bins_recycling',
              'icon': 'mdi:recycle',
              'priority': 1
            },
            {
              'type': 'Garden', 
              'sensor': 'sensor.hounslow_bins_garden_waste',
              'icon': 'mdi:flower',
              'priority': 2
            },
            {
              'type': 'Wheelie',
              'sensor': 'sensor.hounslow_bins_general_waste', 
              'icon': 'mdi:delete',
              'priority': 3
            }
          ] %}

          {% set today = now().date() %}
          {% set next_collections = [] %}

          {% for collection in collections %}
            {% set date_str = states(collection.sensor) %}
            {% if date_str not in ['unknown', 'unavailable'] %}
              {% set collection_date = strptime(date_str, '%Y-%m-%d').date() %}
              {% set days_diff = (collection_date - today).days %}
              {% if days_diff >= 0 %}
                {% set next_collections = next_collections + [collection | combine({'date': collection_date, 'days': days_diff})] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {% if next_collections | length == 0 %}
            No collections scheduled
          {% else %}
            {% set sorted_collections = next_collections | sort(attribute='days') %}
            {% set next_date = sorted_collections[0].date %}
            {% set same_day_collections = sorted_collections | selectattr('date', 'eq', next_date) | list %}
            
            {% if same_day_collections | length > 2 %}
              Multiple Collections
            {% elif same_day_collections | length == 2 %}
              {{ same_day_collections[0].type }} + {{ same_day_collections[1].type }}
            {% else %}
              {{ same_day_collections[0].type }}
            {% endif %}
          {% endif %}

        attributes:
          scheduled: |
            {% set collections = [
              {
                'type': 'Rec',
                'sensor': 'sensor.hounslow_bins_recycling',
                'icon': 'mdi:recycle',
                'priority': 1
              },
              {
                'type': 'Garden', 
                'sensor': 'sensor.hounslow_bins_garden_waste',
                'icon': 'mdi:flower',
                'priority': 2
              },
              {
                'type': 'Wheelie',
                'sensor': 'sensor.hounslow_bins_general_waste', 
                'icon': 'mdi:delete',
                'priority': 3
              }
            ] %}

            {% set today = now().date() %}
            {% set next_collections = [] %}

            {% for collection in collections %}
              {% set date_str = states(collection.sensor) %}
              {% if date_str not in ['unknown', 'unavailable'] %}
                {% set collection_date = strptime(date_str, '%Y-%m-%d').date() %}
                {% set days_diff = (collection_date - today).days %}
                {% if days_diff >= 0 %}
                  {% set next_collections = next_collections + [collection | combine({'date': collection_date, 'days': days_diff})] %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% if next_collections | length == 0 %}
              No collections scheduled
            {% else %}
              {% set sorted_collections = next_collections | sort(attribute='days') %}
              {% set next_collection = sorted_collections[0] %}
              
              {% if next_collection.days == 0 %}
                Today
              {% elif next_collection.days == 1 %}
                Tomorrow
              {% elif next_collection.days <= 7 %}
                In {{ next_collection.days }} day{{ 's' if next_collection.days != 1 else '' }}
              {% else %}
                {{ next_collection.date.strftime('%a %d %b') }}
              {% endif %}
            {% endif %}

          icon: |
            {% set collections = [
              {
                'type': 'Rec',
                'sensor': 'sensor.hounslow_bins_recycling',
                'icon': 'mdi:recycle',
                'priority': 1
              },
              {
                'type': 'Garden', 
                'sensor': 'sensor.hounslow_bins_garden_waste',
                'icon': 'mdi:flower',
                'priority': 2
              },
              {
                'type': 'Wheelie',
                'sensor': 'sensor.hounslow_bins_general_waste', 
                'icon': 'mdi:delete',
                'priority': 3
              }
            ] %}

            {% set today = now().date() %}
            {% set next_collections = [] %}

            {% for collection in collections %}
              {% set date_str = states(collection.sensor) %}
              {% if date_str not in ['unknown', 'unavailable'] %}
                {% set collection_date = strptime(date_str, '%Y-%m-%d').date() %}
                {% set days_diff = (collection_date - today).days %}
                {% if days_diff >= 0 %}
                  {% set next_collections = next_collections + [collection | combine({'date': collection_date, 'days': days_diff})] %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% if next_collections | length == 0 %}
              mdi:calendar-clock
            {% else %}
              {% set sorted_collections = next_collections | sort(attribute='days') %}
              {% set next_date = sorted_collections[0].date %}
              {% set same_day_collections = sorted_collections | selectattr('date', 'eq', next_date) | list %}
              
              {% if same_day_collections | length > 1 %}
                mdi:delete-multiple
              {% else %}
                {{ same_day_collections[0].icon }}
              {% endif %}
            {% endif %}

          icon_color: |
            {% set collections = [
              {
                'type': 'Rec',
                'sensor': 'sensor.hounslow_bins_recycling',
                'icon': 'mdi:recycle',
                'priority': 1
              },
              {
                'type': 'Garden', 
                'sensor': 'sensor.hounslow_bins_garden_waste',
                'icon': 'mdi:flower',
                'priority': 2
              },
              {
                'type': 'Wheelie',
                'sensor': 'sensor.hounslow_bins_general_waste', 
                'icon': 'mdi:delete',
                'priority': 3
              }
            ] %}

            {% set today = now().date() %}
            {% set next_collections = [] %}

            {% for collection in collections %}
              {% set date_str = states(collection.sensor) %}
              {% if date_str not in ['unknown', 'unavailable'] %}
                {% set collection_date = strptime(date_str, '%Y-%m-%d').date() %}
                {% set days_diff = (collection_date - today).days %}
                {% if days_diff >= 0 %}
                  {% set next_collections = next_collections + [collection | combine({'date': collection_date, 'days': days_diff})] %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% if next_collections | length == 0 %}
              grey
            {% else %}
              {% set next_days = next_collections | sort(attribute='days') | first %}
              {% if next_days.days == 0 %}
                red
              {% elif next_days.days == 1 %}
                orange  
              {% elif next_days.days <= 3 %}
                yellow
              {% else %}
                green
              {% endif %}
            {% endif %}

          next_collection_date: |
            {% set collections = [
              {
                'type': 'Rec',
                'sensor': 'sensor.hounslow_bins_recycling',
                'icon': 'mdi:recycle',
                'priority': 1
              },
              {
                'type': 'Garden', 
                'sensor': 'sensor.hounslow_bins_garden_waste',
                'icon': 'mdi:flower',
                'priority': 2
              },
              {
                'type': 'Wheelie',
                'sensor': 'sensor.hounslow_bins_general_waste', 
                'icon': 'mdi:delete',
                'priority': 3
              }
            ] %}

            {% set today = now().date() %}
            {% set next_collections = [] %}

            {% for collection in collections %}
              {% set date_str = states(collection.sensor) %}
              {% if date_str not in ['unknown', 'unavailable'] %}
                {% set collection_date = strptime(date_str, '%Y-%m-%d').date() %}
                {% set days_diff = (collection_date - today).days %}
                {% if days_diff >= 0 %}
                  {% set next_collections = next_collections + [collection | combine({'date': collection_date, 'days': days_diff})] %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% if next_collections | length > 0 %}
              {% set next_date = next_collections | sort(attribute='days') | first %}
              {{ next_date.date.strftime('%Y-%m-%d') }}
            {% else %}
              unknown
            {% endif %}

          days_until_next: |
            {% set collections = [
              {
                'type': 'Rec',
                'sensor': 'sensor.hounslow_bins_recycling',
                'icon': 'mdi:recycle',
                'priority': 1
              },
              {
                'type': 'Garden', 
                'sensor': 'sensor.hounslow_bins_garden_waste',
                'icon': 'mdi:flower',
                'priority': 2
              },
              {
                'type': 'Wheelie',
                'sensor': 'sensor.hounslow_bins_general_waste', 
                'icon': 'mdi:delete',
                'priority': 3
              }
            ] %}

            {% set today = now().date() %}
            {% set next_collections = [] %}

            {% for collection in collections %}
              {% set date_str = states(collection.sensor) %}
              {% if date_str not in ['unknown', 'unavailable'] %}
                {% set collection_date = strptime(date_str, '%Y-%m-%d').date() %}
                {% set days_diff = (collection_date - today).days %}
                {% if days_diff >= 0 %}
                  {% set next_collections = next_collections + [collection | combine({'date': collection_date, 'days': days_diff})] %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% if next_collections | length > 0 %}
              {{ next_collections | sort(attribute='days') | first | attr('days') }}
            {% else %}
              -1
            {% endif %}
