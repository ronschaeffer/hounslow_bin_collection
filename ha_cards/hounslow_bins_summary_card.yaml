type: markdown
content: |
  ## Hounslow Bin Collection Summary

  {% set general_date = states('sensor.hounslow_bins_general_waste') %}
  {% set recycling_date = states('sensor.hounslow_bins_recycling') %}
  {% set food_date = states('sensor.hounslow_bins_food_waste') %}
  {% set garden_date = states('sensor.hounslow_bins_garden_waste') %}
  {% set status = states('binary_sensor.hounslow_bins_status') %}

  {% macro format_date_info(date_string, bin_type) %}
    {% if date_string not in ['unknown', 'unavailable'] %}
      {% set date_obj = strptime(date_string, '%Y-%m-%d') %}
      {% set today = now().date() %}
      {% set days_diff = (date_obj.date() - today).days %}
      {% if days_diff == 0 %}
        **{{ bin_type }}**: 🔴 **Collection TODAY** - Put bin out now!
      {% elif days_diff == 1 %}
        **{{ bin_type }}**: 🟠 **Collection TOMORROW** - Put bin out tonight
      {% elif days_diff <= 3 %}
        **{{ bin_type }}**: 🟡 In {{ days_diff }} day{{ 's' if days_diff != 1 else '' }} ({{ date_obj.strftime('%a %d %b') }})
      {% elif days_diff < 0 %}
        **{{ bin_type }}**: ✅ Collection completed
      {% else %}
        **{{ bin_type }}**: 🟢 {{ date_obj.strftime('%a %d %b %Y') }}
      {% endif %}
    {% else %}
      **{{ bin_type }}**: ❓ Schedule unavailable
    {% endif %}
  {% endmacro %}

  ### Next Collections

  {{ format_date_info(general_date, 'General Waste') }}

  {{ format_date_info(recycling_date, 'Recycling') }}

  {{ format_date_info(food_date, 'Food Waste') }}

  {{ format_date_info(garden_date, 'Garden Waste') }}

  ---

  ### System Status
  {% if status == 'on' %}
  ✅ **System Operational** - All services running normally
  {% elif status == 'off' %}
  ❌ **System Error** - Check logs for details
  {% else %}
  ❓ **Status Unknown** - Unable to determine system state
  {% endif %}

  *Last updated: {{ relative_time(state_attr('binary_sensor.hounslow_bins_status', 'last_updated')) }} ago*

  ### Collection Rules
  - Collections typically occur between **06:00-18:00**
  - Put bins out the **evening before** collection day
  - Bins should be at the **kerbside by 06:00** on collection day
  - Missed collections can be reported to Hounslow Council

  ### Quick Actions
  - [Hounslow Council Website](https://www.hounslow.gov.uk)
  - [Report Missed Collection](https://www.hounslow.gov.uk/info/20002/recycling_and_waste)
  - [Collection Calendar](https://www.hounslow.gov.uk/info/20002/recycling_and_waste/1310/collection_days)
title: "Bin Collection Information"
