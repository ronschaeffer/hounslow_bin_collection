type: custom:mushroom-template-card
primary: Collection Details
secondary: Tap for detailed bin schedule
icon: mdi:information
icon_color: blue
tap_action:
  action: fire-dom-event
  browser_mod:
    service: browser_mod.popup
    data:
      title: "Hounslow Bin Collection Schedule"
      content:
        type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## Current Collection Schedule

              {% set general_date = states('sensor.hounslow_bins_general_waste') %}
              {% set recycling_date = states('sensor.hounslow_bins_recycling') %}
              {% set food_date = states('sensor.hounslow_bins_food_waste') %}
              {% set garden_date = states('sensor.hounslow_bins_garden_waste') %}

              ### General Waste
              {% if general_date not in ['unknown', 'unavailable'] %}
              **Next Collection:** {{ strptime(general_date, '%Y-%m-%d').strftime('%A, %d %B %Y') }}
              {% else %}
              **Status:** Schedule unavailable
              {% endif %}

              ### Recycling
              {% if recycling_date not in ['unknown', 'unavailable'] %}
              **Next Collection:** {{ strptime(recycling_date, '%Y-%m-%d').strftime('%A, %d %B %Y') }}
              {% else %}
              **Status:** Schedule unavailable
              {% endif %}

              ### Food Waste
              {% if food_date not in ['unknown', 'unavailable'] %}
              **Next Collection:** {{ strptime(food_date, '%Y-%m-%d').strftime('%A, %d %B %Y') }}
              {% else %}
              **Status:** Schedule unavailable
              {% endif %}

              ### Garden Waste
              {% if garden_date not in ['unknown', 'unavailable'] %}
              **Next Collection:** {{ strptime(garden_date, '%Y-%m-%d').strftime('%A, %d %B %Y') }}
              {% else %}
              **Status:** Schedule unavailable
              {% endif %}

              ---

              **System Status:** {% if states('binary_sensor.hounslow_bins_status') == 'on' %}✅ Operational{% else %}❌ Error{% endif %}

              **Last Updated:** {{ relative_time(state_attr('binary_sensor.hounslow_bins_status', 'last_updated')) }} ago

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: General Waste
                secondary: |
                  {% set collection_date = states('sensor.hounslow_bins_general_waste') %}
                  {% if collection_date not in ['unknown', 'unavailable'] %}
                    {% set date_obj = strptime(collection_date, '%Y-%m-%d') %}
                    {% set today = now().date() %}
                    {% set days_diff = (date_obj.date() - today).days %}
                    {% if days_diff == 0 %}
                      Today
                    {% elif days_diff == 1 %}
                      Tomorrow
                    {% elif days_diff < 0 %}
                      Completed
                    {% else %}
                      {{ days_diff }} days
                    {% endif %}
                  {% else %}
                    Unknown
                  {% endif %}
                icon: mdi:trash-can
                icon_color: |
                  {% set collection_date = states('sensor.hounslow_bins_general_waste') %}
                  {% if collection_date not in ['unknown', 'unavailable'] %}
                    {% set date_obj = strptime(collection_date, '%Y-%m-%d') %}
                    {% set today = now().date() %}
                    {% set days_diff = (date_obj.date() - today).days %}
                    {% if days_diff <= 1 %}
                      red
                    {% elif days_diff <= 3 %}
                      orange
                    {% else %}
                      green
                    {% endif %}
                  {% else %}
                    grey
                  {% endif %}

              - type: custom:mushroom-template-card
                primary: Recycling
                secondary: |
                  {% set collection_date = states('sensor.hounslow_bins_recycling') %}
                  {% if collection_date not in ['unknown', 'unavailable'] %}
                    {% set date_obj = strptime(collection_date, '%Y-%m-%d') %}
                    {% set today = now().date() %}
                    {% set days_diff = (date_obj.date() - today).days %}
                    {% if days_diff == 0 %}
                      Today
                    {% elif days_diff == 1 %}
                      Tomorrow
                    {% elif days_diff < 0 %}
                      Completed
                    {% else %}
                      {{ days_diff }} days
                    {% endif %}
                  {% else %}
                    Unknown
                  {% endif %}
                icon: mdi:recycle
                icon_color: |
                  {% set collection_date = states('sensor.hounslow_bins_recycling') %}
                  {% if collection_date not in ['unknown', 'unavailable'] %}
                    {% set date_obj = strptime(collection_date, '%Y-%m-%d') %}
                    {% set today = now().date() %}
                    {% set days_diff = (date_obj.date() - today).days %}
                    {% if days_diff <= 1 %}
                      red
                    {% elif days_diff <= 3 %}
                      orange
                    {% else %}
                      blue
                    {% endif %}
                  {% else %}
                    grey
                  {% endif %}
fill_container: true
